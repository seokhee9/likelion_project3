<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>멋쟁이사자처럼 아기사자 관리</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>아기사자 명단</h1>
        <p>총 인원: <span id="total-count">0</span>명</p>
    </header>

    <div style="margin-top: 20px;">
        <button id="btn-show-form" class="btn-toggle">아기사자 추가하기</button>
    </div>

    <div id="input-form-container">
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="input-name">
        </div>
        <div class="input-group">
            <label>파트</label>
            <input type="text" id="input-part">
        </div>
        <div class="input-group">
            <label>관심 기술</label>
            <input type="text" id="input-tech">
        </div>
        <div class="input-group">
            <label>한줄 소개</label>
            <input type="text" id="input-bio">
        </div>
        <button id="btn-add" class="btn-submit">등록하기</button>
    </div>

    <div id="card-list" class="card-list"></div>
</div>

<script>
    // 초기 데이터
    let members = [
        {
            id: Date.now(),
            name: "이석희",
            part: "프론트엔드",
            tech: "HTML, Java",
            bio: "개발에 많은 관심이 있는 학생입니다."
        }
    ];

    const cardList = document.getElementById('card-list');
    const totalCount = document.getElementById('total-count');
    const formContainer = document.getElementById('input-form-container');
    const btnShowForm = document.getElementById('btn-show-form');
    const btnAdd = document.getElementById('btn-add');

    // 화면 그리기 함수
    function render() {
        cardList.innerHTML = '';
        totalCount.innerText = members.length;

        members.forEach(member => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${member.name}</h3>
                <p><strong>파트:</strong> ${member.part}</p>
                <p><strong>관심 기술:</strong> ${member.tech}</p>
                <p><strong>소개:</strong> ${member.bio}</p>
                <button class="delete-btn" data-id="${member.id}">삭제</button>
            `;
            cardList.appendChild(card);
        });
    }

    // 폼 열기/닫기
    btnShowForm.addEventListener('click', () => {
        const isVisible = formContainer.style.display === 'block';
        formContainer.style.display = isVisible ? 'none' : 'block';
        btnShowForm.innerText = isVisible ? '아기사자 추가하기' : '닫기';
    });

    // 등록 기능
    btnAdd.addEventListener('click', () => {
        const name = document.getElementById('input-name').value;
        const part = document.getElementById('input-part').value;
        const tech = document.getElementById('input-tech').value;
        const bio = document.getElementById('input-bio').value;

        if(!name || !part || !tech || !bio) {
            alert('빈칸을 모두 채워주세요!');
            return;
        }

        members.push({ id: Date.now(), name, part, tech, bio });
        render();

        // 초기화
        document.querySelectorAll('input').forEach(input => input.value = '');
        formContainer.style.display = 'none';
        btnShowForm.innerText = '아기사자 추가하기';
    });

    // 삭제 기능
    cardList.addEventListener('click', (e) => {
        if(e.target.classList.contains('delete-btn')) {
            const id = Number(e.target.dataset.id);
            members = members.filter(m => m.id !== id);
            render();
        }
    });

    render();
</script>

</body>
</html>
